appId: "com.sparkatlas.desktop"
productName: "Spark Atlas"
protocols:
  - name: "Spark Atlas"
    schemes:
      - spal
directories:
  buildResources: build
extraMetadata:
  name: "spark-atlas-desktop"
  productName: "Spark Atlas"
  description: "Spark Atlas"
  author: "Spark Atlas"
  homepage: "https://openwebui.com"
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!svelte.config.mjs'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: CHANGELOG.md
    to: CHANGELOG.md
asarUnpack:
  - resources/**
  - node_modules/node-pty/**
win:
  executableName: "spark-atlas"
nsis:
  artifactName: "spark-atlas-desktop-${arch}-setup.${ext}"
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - target: dmg
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: "spark-atlas-desktop-${arch}-mac.${ext}"
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
dmg:
  background: build/dmg-background.png
  artifactName: "spark-atlas-desktop-${arch}.${ext}"
  title: ${productName}
  contents:
    - x: 225
      y: 250
      type: file
    - x: 400
      y: 240
      type: link
      path: /Applications
linux:
  target:
    - AppImage
    - snap
    - deb
    - flatpak
  maintainer: "openwebui.com"
  category: Utility
deb:
  artifactName: "spark-atlas-desktop_${arch}.${ext}"
snap:
  artifactName: "spark-atlas-desktop_${arch}.${ext}"
appImage:
  artifactName: "spark-atlas-desktop_${arch}.${ext}"
flatpak:
  base: org.electronjs.Electron2.BaseApp
  baseVersion: '23.08'
  runtime: org.freedesktop.Platform
  runtimeVersion: '23.08'
  sdk: org.freedesktop.Sdk
  artifactName: "spark-atlas-desktop.flatpak"
  finishArgs:
    - --share=ipc
    - --socket=x11
    - --socket=wayland
    - --socket=pulseaudio
    - --share=network
    - --device=dri
    - --filesystem=home
    - --talk-name=org.freedesktop.Notifications
    - --talk-name=org.freedesktop.portal.Desktop
npmRebuild: false
publish:
  provider: generic
  url: "https://chat.spark-ai.top/api/v1/configs/apps/updates/desktop/"
